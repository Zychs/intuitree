<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>intuitree • intuitive git visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        #viz {
            border: 1px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            cursor: grab;
        }
        #viz:active { cursor: grabbing; }
        .node { transition: all 0.1s ease; }
        .tooltip {
            position: absolute;
            background: #1e2937;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            max-width: 280px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-[1400px] mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-violet-600 rounded-xl flex items-center justify-center">
                    <span class="text-white text-2xl font-bold">🌳</span>
                </div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tight">intuitree</h1>
                    <p class="text-slate-400 text-sm -mt-1">intuitive spatial git visualization</p>
                </div>
            </div>
            <div class="flex items-center gap-x-2 text-sm">
                <div class="px-3 py-1.5 bg-slate-900 rounded-lg border border-slate-800 flex items-center gap-x-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-emerald-400">v0 — interactive canvas</span>
                </div>
                <button onclick="resetView()" 
                        class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm flex items-center gap-x-2 transition-colors">
                    <span>Reset View</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Controls -->
            <div class="lg:col-span-3 bg-slate-900 border border-slate-800 rounded-2xl p-5 h-fit">
                <h3 class="font-semibold mb-4 flex items-center gap-x-2">
                    <span>Controls</span>
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1.5">Color by</label>
                        <select id="colorMode" onchange="redraw()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">
                            <option value="extension">File Extension</option>
                            <option value="type">File vs Directory</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 block mb-1.5">Zoom</label>
                        <input type="range" id="zoomSlider" min="0.3" max="4" step="0.1" value="1" 
                               oninput="setZoom(this.value)" class="w-full accent-violet-600">
                        <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                            <div>0.3x</div><div id="zoomValue">1.0x</div><div>4x</div>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-800">
                        <div class="text-xs text-slate-400 mb-2">Legend (extension colors)</div>
                        <div id="legend" class="grid grid-cols-2 gap-x-3 gap-y-1 text-xs"></div>
                    </div>

                    <button onclick="loadMockData()" 
                            class="w-full mt-2 py-2.5 bg-violet-600 hover:bg-violet-700 active:bg-violet-800 rounded-xl text-sm font-medium transition-colors">
                        Reload Mock Tree
                    </button>
                </div>
            </div>

            <!-- Canvas -->
            <div class="lg:col-span-9 relative">
                <canvas id="viz" width="980" height="620" class="w-full shadow-2xl"></canvas>
                <div id="tooltip" class="tooltip hidden"></div>
                
                <div class="absolute bottom-4 right-4 bg-slate-900/90 border border-slate-700 text-[10px] px-3 py-1.5 rounded-lg text-slate-400">
                    Drag to pan • Scroll to zoom • Hover nodes
                </div>
            </div>
        </div>

        <div class="mt-6 text-xs text-slate-500 flex items-center gap-x-4">
            <div>Built with Grok Build/Compose • Staged via T:\compose-staging\</div>
            <div class="flex-1 h-px bg-slate-800"></div>
            <div>Owner: Zychs • <a href="https://github.com/Zychs/intuitree" class="hover:text-slate-300">github.com/Zychs/intuitree</a></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');

        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let nodes = [];
        let hoveredNode = null;

        // Extension color map (customizable)
        const extColors = {
            '.js': '#f1e05a',
            '.ts': '#3178c6',
            '.py': '#3572A5',
            '.md': '#6b7280',
            '.json': '#854d0e',
            '.html': '#e34c26',
            '.css': '#264de4',
            '.sh': '#89e051',
            '.go': '#00ADD8',
            '.rs': '#dea584',
            'dir': '#8b5cf6',
            'default': '#64748b'
        };

        // Mock git-style file tree (v0)
        function getMockTree() {
            return {
                name: 'root',
                type: 'dir',
                path: '',
                children: [
                    { name: 'src', type: 'dir', path: 'src', children: [
                        { name: 'main.js', type: 'file', path: 'src/main.js', ext: '.js', size: 1240 },
                        { name: 'utils.ts', type: 'file', path: 'src/utils.ts', ext: '.ts', size: 890 },
                        { name: 'components', type: 'dir', path: 'src/components', children: [
                            { name: 'Button.tsx', type: 'file', path: 'src/components/Button.tsx', ext: '.ts', size: 2100 },
                            { name: 'Modal.tsx', type: 'file', path: 'src/components/Modal.tsx', ext: '.ts', size: 1850 }
                        ]}
                    ]},
                    { name: 'README.md', type: 'file', path: 'README.md', ext: '.md', size: 3200 },
                    { name: 'package.json', type: 'file', path: 'package.json', ext: '.json', size: 680 },
                    { name: 'scripts', type: 'dir', path: 'scripts', children: [
                        { name: 'build.sh', type: 'file', path: 'scripts/build.sh', ext: '.sh', size: 420 }
                    ]},
                    { name: 'docs', type: 'dir', path: 'docs', children: [
                        { name: 'architecture.md', type: 'file', path: 'docs/architecture.md', ext: '.md', size: 15400 }
                    ]}
                ]
            };
        }

        function flattenTree(node, depth = 0, x = 400, yBase = 80) {
            const flat = [];
            const y = yBase + depth * 78;
            
            flat.push({
                ...node,
                x: x,
                y: y,
                depth: depth,
                width: node.type === 'dir' ? 160 : 140,
                height: 32
            });

            if (node.children) {
                const childStartX = x - (node.children.length - 1) * 95;
                node.children.forEach((child, i) => {
                    const childX = childStartX + i * 190;
                    flat.push(...flattenTree(child, depth + 1, childX, yBase));
                });
            }
            return flat;
        }

        function draw() {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // Draw connections first
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                if (node.children) {
                    node.children.forEach(child => {
                        const childNode = nodes.find(n => n.path === child.path);
                        if (childNode) {
                            ctx.beginPath();
                            ctx.moveTo(node.x + node.width/2, node.y + node.height/2);
                            ctx.lineTo(childNode.x + childNode.width/2, childNode.y + childNode.height/2);
                            ctx.stroke();
                        }
                    });
                }
            }

            // Draw nodes
            const colorMode = document.getElementById('colorMode').value;
            
            nodes.forEach(node => {
                const isDir = node.type === 'dir';
                let color = extColors['default'];
                
                if (colorMode === 'extension') {
                    color = isDir ? extColors['dir'] : (extColors[node.ext] || extColors['default']);
                } else {
                    color = isDir ? extColors['dir'] : '#64748b';
                }

                // Node background
                ctx.fillStyle = color;
                ctx.strokeStyle = '#1e2937';
                ctx.lineWidth = 2;
                
                const radius = isDir ? 8 : 6;
                ctx.beginPath();
                ctx.roundRect(node.x, node.y, node.width, node.height, radius);
                ctx.fill();
                ctx.stroke();

                // Label
                ctx.fillStyle = '#f8fafc';
                ctx.font = isDir ? '600 13px system-ui' : '13px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const label = node.name.length > 18 ? node.name.slice(0, 15) + '...' : node.name;
                ctx.fillText(label, node.x + node.width/2, node.y + node.height/2);
            });

            ctx.restore();
        }

        function redraw() {
            draw();
        }

        function updateLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            Object.entries(extColors).forEach(([ext, color]) => {
                if (ext === 'default') return;
                const div = document.createElement('div');
                div.className = 'flex items-center gap-x-2';
                div.innerHTML = `
                    <div class="w-3 h-3 rounded" style="background: ${color}"></div>
                    <span class="text-slate-400">${ext}</span>
                `;
                legend.appendChild(div);
            });
        }

        function setZoom(value) {
            scale = parseFloat(value);
            document.getElementById('zoomValue').textContent = scale.toFixed(1) + 'x';
            draw();
        }

        function resetView() {
            scale = 1;
            offsetX = 40;
            offsetY = 20;
            document.getElementById('zoomSlider').value = 1;
            document.getElementById('zoomValue').textContent = '1.0x';
            draw();
        }

        function loadMockData() {
            const tree = getMockTree();
            nodes = flattenTree(tree);
            offsetX = 40;
            offsetY = 20;
            scale = 1;
            document.getElementById('zoomSlider').value = 1;
            draw();
            updateLegend();
        }

        // Mouse interaction
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) {
                // Hover detection
                const rect = canvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left - offsetX) / scale;
                const mouseY = (e.clientY - rect.top - offsetY) / scale;

                hoveredNode = null;
                for (const node of nodes) {
                    if (mouseX > node.x && mouseX < node.x + node.width &&
                        mouseY > node.y && mouseY < node.y + node.height) {
                        hoveredNode = node;
                        break;
                    }
                }

                if (hoveredNode) {
                    tooltip.style.left = `${e.clientX + 15}px`;
                    tooltip.style.top = `${e.clientY + 15}px`;
                    tooltip.innerHTML = `
                        <div class="font-medium">${hoveredNode.name}</div>
                        <div class="text-emerald-400 text-xs">${hoveredNode.path}</div>
                        ${hoveredNode.size ? `<div class="text-xs text-slate-400 mt-0.5">${(hoveredNode.size/1024).toFixed(1)} KB</div>` : ''}
                        <div class="text-[10px] text-slate-500 mt-1">${hoveredNode.type === 'dir' ? 'Directory' : 'File'} • Click to focus</div>
                    `;
                    tooltip.classList.remove('hidden');
                } else {
                    tooltip.classList.add('hidden');
                }
                return;
            }

            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            offsetX += dx;
            offsetY += dy;
            lastX = e.clientX;
            lastY = e.clientY;
            draw();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
            const newScale = Math.max(0.3, Math.min(4, scale * zoomFactor));

            // Zoom toward mouse
            offsetX = mouseX - (mouseX - offsetX) * (newScale / scale);
            offsetY = mouseY - (mouseY - offsetY) * (newScale / scale);
            scale = newScale;

            document.getElementById('zoomSlider').value = scale;
            document.getElementById('zoomValue').textContent = scale.toFixed(1) + 'x';
            draw();
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') resetView();
        });

        // Init
        function init() {
            loadMockData();
            resetView();
            
            // Initial legend
            setTimeout(() => {
                updateLegend();
            }, 50);

            // Bonus: click to "select" node (future: open file)
            canvas.addEventListener('click', () => {
                if (hoveredNode) {
                    console.log('Selected:', hoveredNode);
                    // Future: highlight subtree or load real content
                }
            });

            console.log('%c[intuitree] v0 canvas ready — Grok Build/Compose scaffold complete', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>
</html>
